<!DOCTYPE html>
<html lang="en">

<head>

  <style>
    button {
      margin: 3px;
    }

    button:hover {
      cursor: pointer;
    }

    #first-num,
    #second-num {
      width: 60px;
    }

    output {
      border: 1px solid gray;
      display: block;
      height: 18px;
      margin-top: 5px;
      padding: 5px;
      width: 240px;
    }

    main {
      width: 800px;
    }

    #error-btns {
      column-gap: 5px;
      display: flex;
      flex-wrap: wrap;
      margin-top: 30px;
      row-gap: 5px;
    }

    #error-btns>* {
      padding: 8px 2px;
      width: 122px;
    }
  </style>
</head>

<body>
  <main>
    <form>
      <fieldset>
        <legend>Error Calculator</legend>
        <input name="first-num" id="first-num" />
        <select name="operator" id="operator">
          <option>+</option>
          <option>-</option>
          <option>*</option>
          <option>/</option>
        </select>
        <input name="second-num" id="second-num" />
        <button id="calculate">Calculate</button>
        <br />
        <output></output>
      </fieldset>
    </form>

    <section id="error-btns">
      <button>Console Log</button>
      <button>Console Error</button>
      <button>Console Count</button>
      <button>Console Warn</button>
      <button>Console Assert</button>
      <button>Console Clear</button>
      <button>Console Dir</button>
      <button>Console dirxml</button>
      <button>Console Group Start</button>
      <button>Console Group End</button>
      <button>Console Table</button>
      <button>Start Timer</button>
      <button>End Timer</button>
      <button>Console Trace</button>
      <button>Trigger a Global Error</button>
    </section>
  </main>

  <script>
    class CalculatorError extends Error {
      constructor(message) {
        super(message);
        this.name = "CalculatorError";
      }
    }
    let form = document.querySelector('form');
    form.addEventListener('submit', e => {
    e.preventDefault();
    let output = document.querySelector('output');
    let firstNum = document.querySelector('#first-num').value;
    let secondNum = document.querySelector('#second-num').value;
    let operator = document.querySelector('#operator').value;

    try {
        // Check if inputs are empty
        if (firstNum === "" || secondNum === "") {
            throw new CalculatorError("Input fields cannot be empty!");
        }
        // Check if inputs are not valid numbers
        if (isNaN(firstNum) || isNaN(secondNum)) {
            throw new TypeError("Inputs must be numbers!");
        }

        let result = eval(`${firstNum} ${operator} ${secondNum}`);
        output.innerHTML = result;

    } catch (err) {
        // Check the type of error to provide specific feedback
        if (err instanceof CalculatorError) {
            console.error(`[Custom Error]: ${err.message}`);
        } else {
            console.error(`[Standard Error]: ${err.message}`);
        }
        output.innerHTML = "Error!";
    } finally {
        console.log("Calculation attempt finished.");
    }
});

    let errorBtns = Array.from(document.querySelectorAll('#error-btns > button'));

    // Start your code here

    // Step 2 - Implementing Console Methods
    // We iterate through errorBtns and assign logic based on the HTML order

    errorBtns[0].addEventListener('click', () => {
        console.log('Console Log Demo');
    });

    errorBtns[1].addEventListener('click', () => {
        console.error('Console Error Demo');
    });

    errorBtns[2].addEventListener('click', () => {
        console.count('Count Button');
    });

    errorBtns[3].addEventListener('click', () => {
        console.warn('Console Warn Demo');
    });

    errorBtns[4].addEventListener('click', () => {
        const x = 5, y = 2;
        const reason = 'x is expected to be less than y';
        console.assert(x < y, {x, y, reason});
    });

    errorBtns[5].addEventListener('click', () => {
        console.clear();
    });

    errorBtns[6].addEventListener('click', () => {
        console.dir(errorBtns[6]);
    });

    errorBtns[7].addEventListener('click', () => {
        console.dirxml(document.querySelector('#error-btns'));
    });

    errorBtns[8].addEventListener('click', () => {
        console.group('Log Group');
    });

    errorBtns[9].addEventListener('click', () => {
        console.groupEnd('Log Group');
      });

    errorBtns[10].addEventListener('click', () => {
        console.table([
            { name: 'Software Engineering', num: 110 },
            { name: 'Programming Languages', num: 130 }
        ]);
    });

    errorBtns[11].addEventListener('click', () => {
        console.time('Timer');
    });

    errorBtns[12].addEventListener('click', () => {
        console.timeEnd('Timer');
    });

    errorBtns[13].addEventListener('click', () => {
        const deep = () => { deeper(); };
        const deeper = () => { deepest(); };
        const deepest = () => { console.trace(); };
        deep();
    });

    window.onerror = function (message, source, lineno, colno, error) {
    console.log("Sadly, a global error has occurred.");
    // Returning true prevents the default browser error logging if you want a clean console
    return false;
    };

    // Trigger functionality for the last button
    // It's the 15th button, so index is 14
    errorBtns[14].addEventListener('click', () => {
        console.log("Attempting to trigger global error...");
        // This function doesn't exist, so it will cause a ReferenceError
        nonExistentFunction();
    });
  </script>
</body>

</html>
